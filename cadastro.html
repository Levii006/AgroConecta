<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Agro Conecta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-md mx-auto mt-20 bg-white rounded-3xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-700">Criar Conta</h1>
            <a href="index.html" class="text-emerald-600 hover:text-emerald-700">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Início
            </a>
        </div>

        <form id="cadastro-form" onsubmit="handleCadastro(event)">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Nome completo</label>
                    <input id="nome" type="text" required 
                           class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">E-mail</label>
                    <input id="email" type="email" required 
                           class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <!---<div>
                    <label class="block text-sm font-medium mb-2">Telefone (WhatsApp)</label>
                    <input id="telefone" type="tel" required 
                           class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                </div> --->

                <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-3xl font-semibold text-lg">
                    Cadastrar Agora
                </button>
            </div>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Já tem conta? <a href="login.html" class="text-emerald-600 font-medium">Entrar</a>
        </p>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
